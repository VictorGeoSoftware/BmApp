name: Android CI Firebase Distribution

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Generate deploy version label
        run: echo "APP_DEPLOY_VERSION=v$(date +'%d%m_%H%M')" >> "$GITHUB_ENV"

      - name: Compute versionCode from git history
        run: |
          git fetch --prune --unshallow 2>/dev/null || true
          echo "APP_VERSION_CODE=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Build dev debug APK
        run: ./gradlew :app:assembleDevDebug

      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          # PowerApp Dev (Firebase project brielmarnysos-1dc68)
          appId: 1:939713844198:android:0b3d49a9e7fba7e2643c27
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BRIELMARNYSOS }}
          groups: internal-testers
          file: app/build/outputs/apk/dev/debug/app-dev-debug.apk
          releaseNotes: Automated build from GitHub Actions for ${{ github.sha }}
