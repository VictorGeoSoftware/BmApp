name: Google Play Distribution

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track to publish to'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
  push:
    tags:
      - 'v*'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compute versionCode from git history
        run: |
          git fetch --prune --unshallow 2>/dev/null || true
          echo "APP_VERSION_CODE=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Generate deploy version label
        run: echo "APP_DEPLOY_VERSION=v$(date +'%d%m_%H%M')" >> "$GITHUB_ENV"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.jks

      - name: Build prod release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleProdRelease

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.briel.marnisos.powerapp
          releaseFiles: app/build/outputs/bundle/prodRelease/app-prod-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
